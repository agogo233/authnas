services:
  authnas: 
    image: authnas/authnas:latest
    restart: unless-stopped
    volumes:
      - ./authnas/config:/app/config
      # Only required for declaring OIDC Apps via docker labels (see OIDC-Setup documentation)
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000" # may not be needed, depending on reverse-proxy setup
    environment:
      # Required environment variables, set in .env file or replace ${...} with value
      # See https://authnas.app/#/Getting-Started?id=environment-variables for a list of possible environment variables
      APP_URL: ${APP_URL} # required
      DB_ADAPTER: postgres # this is the default value
      DB_HOST: authnas-db # required
      DB_PASSWORD: ${DB_PASSWORD} # required, and must be the same as POSTGRES_PASSWORD in authnas-db service
      STORAGE_KEY: ${STORAGE_KEY} # required
    depends_on:
      authnas-db:
        condition: service_healthy

  authnas-db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD} # required, and must be the same as DB_PASSWORD in authnas service
    ports:
      - "5432:5432"
    volumes:
      - ./authnas/db:/var/lib/postgresql/18/docker
    healthcheck:
      test: "pg_isready -U postgres -h localhost"
