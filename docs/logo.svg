<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b794f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#906bc7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d7baff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#906bc7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Icon -->
  <g transform="translate(10, 10)">
    <path d="M40 5 L70 15 L70 45 C70 70 55 90 40 95 C25 90 10 70 10 45 L10 15 Z" 
          fill="url(#shieldGradient)" 
          stroke="#704ca5" 
          stroke-width="2"/>
    <!-- Lock/Shield inner design -->
    <path d="M40 25 L40 25" 
          stroke="#ffffff" 
          stroke-width="3" 
          stroke-linecap="round"/>
    <circle cx="40" cy="40" r="8" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="3"/>
    <path d="M40 48 L40 58" 
          stroke="#ffffff" 
          stroke-width="3" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Text: AuthNas -->
  <text x="100" y="72" 
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="56" 
        font-weight="600" 
        fill="url(#purpleGradient)">AuthNas</text>
  
  <!-- Subtitle tagline -->
  <text x="102" y="98" 
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" 
        font-size="14" 
        fill="#888888">Single Sign-On for Your Self-Hosted Universe</text>
</svg>
