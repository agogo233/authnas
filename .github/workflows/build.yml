name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Download Go dependencies
        working-directory: ./go-server
        run: |
          go mod download
          go mod tidy

      - name: Build frontend
        working-directory: ./web
        run: npm ci --legacy-peer-deps && npm run build

      - name: Build Go server
        working-directory: ./go-server
        run: |
          mkdir -p bin
          go build -o ./bin/authnas ./cmd/server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            go-server/bin/authnas
            go-server/static
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    env:
      CONTAINER_NAME: authnas

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: ./go-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.CONTAINER_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=beta

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./go-server
          file: ./go-server/Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.CONTAINER_NAME }}
          package-type: 'container'
          min-versions-to-keep: 2
          delete-only-untagged-versions: 'true'
